version: '3.8'

services:
  dashboard:
    build: .
    ports:
      - "8000:8000"
    environment:
      - MONGO_URL=mongodb://mongo:27017
      - DB_NAME=grwa_campaign
      - REDIS_URL=redis://redis:6379/0
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - HOST=0.0.0.0
      - PORT=8000
    volumes:
      - ./uploads:/app/uploads
    depends_on:
      - mongo
      - redis
    restart: unless-stopped

  celery_worker:
    build: .
    command: celery -A app.worker.celery_app worker --loglevel=info
    environment:
      - MONGO_URL=mongodb://mongo:27017
      - DB_NAME=grwa_campaign
      - REDIS_URL=redis://redis:6379/0
      - OPENAI_API_KEY=${OPENAI_API_KEY}
    volumes:
      - ./uploads:/app/uploads
    depends_on:
      - mongo
      - redis
    restart: unless-stopped

  celery_beat:
    build: .
    command: celery -A app.worker.celery_app beat --loglevel=info
    environment:
      - MONGO_URL=mongodb://mongo:27017
      - DB_NAME=grwa_campaign
      - REDIS_URL=redis://redis:6379/0
    depends_on:
      - mongo
      - redis
    restart: unless-stopped

  mongo:
    image: mongo:7
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    restart: unless-stopped
    
  redis:
    image: redis:7
    ports:
      - "6379:6379"
    restart: unless-stopped

volumes:
  mongo_data: